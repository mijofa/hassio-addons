external_components:
  # I couldn't find mention of this in m5stack's docs, but I found it somewhere online and it made things work.
  # Without this, the amp turned on and silent/static came out during playback, but no actual audio
  # See https://github.com/m5stack/esphome-yaml/tree/main/components/es8311 for info
  - source: github://m5stack/esphome-yaml/components@main
    components: [es8311]
    refresh: 1d
  # https://github.com/esphome/esphome/pull/14389
  - source: github://pr#14389
    components: [ snapclient, media_player ]
    refresh: 1d

# ============================================================================
# M5Stack ATOM S3 Lite - ESPHome Configuration
# ============================================================================
# ref: https://devices.esphome.io/devices/m5stack-atoms3-lite/
substitutions:
  # The internal name used by ESPHome (use lowercase, no spaces, hyphens OK)
  devicename: "m5s-atoms3lite-media-player"
  # The friendly name shown in Home Assistant (can have spaces and capitals)
  friendly_name: "M5Stack ATOM S3 Lite"
  # Description of what this device does
  device_comment: "M5Stack ATOM S3 Lite - Multi-purpose ESPHome Device - Media Player"

# ============================================================================
# Core ESPHome Configuration
# ============================================================================
esphome:
  # Uses the devicename variable defined above (m5stack-atoms3-lite)
  name: ${devicename}

  # Uses the friendly_name variable defined above
  friendly_name: ${friendly_name}

  # Uses the device_comment variable defined above
  comment: ${device_comment}

# FIXME: ESPHome Device Builder bakes this secret in... never let this secret get to the upstream git repo.
api:
  encryption:
    key: !secret ...

ota:
  - platform: esphome

# ============================================================================
# ESP32 Hardware Configuration
# ============================================================================
esp32:
  # Tells ESPHome which board you're using (ATOM S3 Lite uses ESP32-S3)
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 8MB
  framework:
    type: esp-idf

# ============================================================================
# Logger - Serial Output for Debugging
# ============================================================================
logger:
  # baud_rate: 0 is REQUIRED for ESP32-S3 (it uses USB-CDC, not traditional UART)
  baud_rate: 0
  # # How much detail to show in logs (VERY_VERBOSE shows everything... wtf did upstream say: DEBUG shows everything, INFO shows less)
  # # level: VERY_VERBOSE
  # level: DEBUG

# ============================================================================
# WiFi Configuration
# ============================================================================
wifi:
  # Your WiFi network name (SSID) - stored in secrets.yaml
  ssid: !secret wifi_ssid

  # Your WiFi password - stored in secrets.yaml
  password: !secret wifi_password

  # # ref: https://github.com/esphome/esphome/pull/14389
  # post_connect_roaming: false  # No resyncs after 5, 10 and 15 minutes
  
# This worked, but I disabled it during dev as I wasn't sure if it was causing issues of using too much RAM.
# Now I'm just afraid of turning it back on.
