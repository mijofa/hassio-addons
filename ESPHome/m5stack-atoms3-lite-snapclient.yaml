# ...#35-speaker-amplifier-configuration
pi4ioe5v6408:
  - id: pi4ioe5v6408_hub
    i2c_id: ext_bus
    address: 0x43
switch:
  - platform: gpio
    name: "Speaker Enable"
    id: speaker_enable
    pin:
      pi4ioe5v6408: pi4ioe5v6408_hub
      number: 0
      mode:
        output: true
    icon: "mdi:volume-high"
    restore_mode: RESTORE_DEFAULT_ON

media_player:
  - platform: snapclient
    # hostname: harvest.mike.abrahall.id.au
    # port: 1704  # default
    name: ${friendly_name}
    # mute_pin: 18
    audio_dac: es8311_dac
    i2s_dout_pin: GPIO5
    on_play:
      - logger.log: "Playback started!"
    on_pause:
      - logger.log: "Playback paused!"
    on_idle:
      - logger.log: "Playback finished!"
    on_state:
      - logger.log: "Playback State change!"

