external_components:
  # I couldn't find mention of this in m5stack's docs, but I found it somewhere online and it made things work.
  # Without this, the amp turned on and silent/static came out during playback, but no actual audio
  # See https://github.com/m5stack/esphome-yaml/tree/main/components/es8311 for info
  # FIXME: Can I remove this and just set `use_mclk: false`? Looks like that's already set
  - source: github://m5stack/esphome-yaml/components@main
    components: [es8311]
    refresh: 1d
  # https://github.com/esphome/esphome/pull/14389
  - source: github://pr#14389
    components: [ snapclient, media_player ]
    refresh: 1d
  # - source: github://mijofa/esphome-luar123-snapclient@snapclient2
  #   components: [ snapclient, media_player ]
  #   refresh: 0s

# ============================================================================
# ESP32 Hardware Configuration
# ============================================================================
esp32:
  framework:
    type: esp-idf


# ref: https://docs.m5stack.com/en/homeassistant/media_player/atomic_audio_3.5_base
# ...#31-basic-configuration
i2c:
  - id: ext_bus
    # sda: GPIO38
    sda: ${i2c_sda}
    # scl: GPIO39
    scl: ${i2c_scl}
# ...#35-speaker-amplifier-configuration
# This is a "port extender" it just gives you more GPIO over I2C.
# It is only used for this 1 single "speaker enable" PIN,
# without it the builtin speaker won't turn on.
# It isn't useful to use because we don't care for the builtin speaker,
# only the 3.5" socket
# FIXME: Consider marking this internal and always on.
# FIXME: Can we switch this on/off from firmware when snapcast mutes/unmutes?
pi4ioe5v6408:
  - id: pi4ioe5v6408_hub
    i2c_id: ext_bus
    address: 0x43
# switch:
#   # This GPIO pin ONLY affects the internal speaker, not the dac itself.
#   # Making it effectively useless to me, so might as well not have it.
#   - platform: gpio
#     name: "Speaker Enable"
#     id: speaker_enable
#     pin:
#       pi4ioe5v6408: pi4ioe5v6408_hub
#       number: 0
#       mode:
#         output: true
#     icon: "mdi:volume-high"
#     # FIXME: This should probably be ALWAYS_OFF and trust snapclient to turn it on after a reboot?
#     restore_mode: ALWAYS_OFF

# ...#32-audio-configuration
i2s_audio:
  - id: i2s_audio_bus
    # i2s_lrclk_pin: GPIO6
    i2s_lrclk_pin: ${i2s_lrclk_pin}
    # i2s_bclk_pin: GPIO8
    i2s_bclk_pin: ${i2s_bclk_pin}
audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: ext_bus
    bits_per_sample: 16bit
    sample_rate: 48000
    use_microphone: false
    use_mclk: false

