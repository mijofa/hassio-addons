## Base stuff setup mostly by Home Assistant
esphome:
  name: m5stack-atom-echos3r
  friendly_name: M5Stack Atom Echo S3R

# Enable Home Assistant API
api:
  encryption:
    key: [redacted]

ota:
  - platform: esphome
    id: ota_esphome
    password: [redacted]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  # FIXME: Turn this off, you're smart enough to use USB or make a new WiFi AP matching the above ssid if needed
  ap:
    ssid: "M5Stack-Atom-Echos3R"
    password: [redacted]

logger:
  level: DEBUG

## M5Stack stuff
esp32:
  board: esp32s3box
  variant: esp32s3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    ## Note: Disable these configurations if you face the boot loop issue.
    sdkconfig_options:
        CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
        CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
        CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"

psram:
  mode: octal
  speed: 80MHz
  disabled: true

button:
  - platform: factory_reset
    id: factory_reset_btn
    internal: true

event:
  # Neither upstream had this button event, I set it up myself mostly because I hate having a button I can't use
  - platform: template
    id: user_btn
    name: Button
    device_class: button
    icon: mdi:gesture-tap
    # icon: mdi:gesture-tap-hold
    # icon: mdi:gesture-tap-double
    # icon: mdi:gesture-tap-box
    # icon: mdi:gesture-tap-button
    # icon: mdi:speaker-message
    event_types:
      - pressed_short
      - pressed_double
      - pressed_long
    on_event:
      then:
        - lambda: |-
            ESP_LOGD("main", "Event %s triggered.", event_type.c_str());

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO41
      mode: INPUT_PULLUP
      inverted: true
    id: user_button
    internal: true
    # internal: false
    # name: User Button
    # icon: mdi:gesture-tap
    on_multi_click:
      # M5Stack upstream had only this factory_reset_btn.
      # I setup the rest so I could use this button in Home Assistant
      - timing:
          - ON for at least 10s
        then:
          - button.press: factory_reset_btn
      - timing:
          - ON for at least 1s
          # - OFF for at least 0.5s
        then:
          - event.trigger:
              id: user_btn
              event_type: pressed_long
      - timing:
          - ON for at most 1s
          - OFF for at most 1s
          - ON for at most 1s
          # - OFF for at least 0.2s
        then:
          - event.trigger:
              id: user_btn
              event_type: pressed_double
      - timing:
        - ON for at most 1s
        - OFF for at least 0.5s
        then:
          - event.trigger:
              id: user_btn
              event_type: pressed_short

# I2C Bus Configuration
i2c:
  sda:
    number: GPIO45
    ignore_strapping_warning: true
  scl:
    number: GPIO0
    ignore_strapping_warning: true
  scan: false
  id: i2c0

# I2S Bus Configuration
i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin:
      number: GPIO3
      ignore_strapping_warning: true
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO11

audio_dac:
  - platform: es8311
    id: es8311_dac
    bits_per_sample: 16bit
    sample_rate: 48000

# M5Stack upstream marked this as internal and used it in some scripting.
# I've decided to make this visible to Home Assistant, but don't know how I'll use it.
switch:
  - platform: gpio
    name: Speaker Enable
    pin: GPIO18
    # Upstream had this set to RESTORE_DEFAULT_ON, that was a little confusing because it was hard to tell whether it booted successfully.
    restore_mode: ALWAYS_ON
    entity_category: config
    disabled_by_default: true
    internal: false

## Snapcast snapclient stuff.
## ref: https://github.com/esphome/esphome/pull/14389   and   https://github.com/sonocotta/esp32-audio-dock/blob/main/firmware/esphome/packages/snapclient-new.yaml
external_components:
  - source: github://pr#14389
    components: [ snapclient ]
    refresh: 24h

media_player:
  - platform: snapclient
    name: M5Stack Atom Echo S3R
    hostname: "192.168.41.189"
    # port: 1704
    id: snapclient_media_player
    i2s_dout_pin: GPIO48
    # FIXME: Does this flatten L/R or does it just pick one?
    channel: mono
    audio_dac: es8311_dac
    # I've set these to match audio_dac, but is that even useful? will snapclient just figure that out anyway?
    bits_per_sample: 16bit
    sample_rate: 4800

    on_play:
      - logger.log: "Playback started!"
    on_pause:
      - logger.log: "Playback paused!"
    on_idle:
      - logger.log: "Playback finished!"

