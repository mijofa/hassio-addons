# ref: https://docs.m5stack.com/en/homeassistant/media_player/atomic_audio_3.5_base
# ...#31-basic-configuration
i2c:
  - id: ext_bus
    # sda: GPIO38
    sda: ${i2c_sda}
    # scl: GPIO39
    scl: ${i2c_scl}
# ...#35-speaker-amplifier-configuration
# This is a "port extender" it just gives you more GPIO over I2C.
# It is only used for this 1 single "speaker enable" PIN,
# without it the builtin amp won't turn on.
# FIXME: Consider marking this internal and always on.
# FIXME: Can we switch this on/off from firmware when snapcast mutes/unmutes?
pi4ioe5v6408:
  - id: pi4ioe5v6408_hub
    i2c_id: ext_bus
    address: 0x43
# You might need this switch if you replace snapcast with sendspin or similar
# switch:
#   - platform: gpio
#     name: "Speaker Enable"
#     id: speaker_enable
#     pin:
#       pi4ioe5v6408: pi4ioe5v6408_hub
#       number: 0
#       mode:
#         output: true
#     icon: "mdi:volume-high"
#     # FIXME: Use DEFAULT_ON instead to avoid any confusion if I forgot I turned it off before reboot?
#     restore_mode: RESTORE_DEFAULT_ON

# ...#32-audio-configuration
i2s_audio:
  - id: i2s_audio_bus
    # i2s_lrclk_pin: GPIO6
    i2s_lrclk_pin: ${i2s_lrclk_pin}
    # i2s_bclk_pin: GPIO8
    i2s_bclk_pin: ${i2s_bclk_pin}
audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: ext_bus
    bits_per_sample: 16bit
    sample_rate: 48000
    use_microphone: false
    use_mclk: false

