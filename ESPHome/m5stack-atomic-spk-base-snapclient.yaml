# Uncomment this section for snapcast instead of sendspin
media_player:
  - platform: snapclient
    # Don't show up in Home Assistant, because Home Assistant can't really do anything with it anyway.
    # FIXME: Is it possible to associate the snapcast player with this device?
    internal: true
    id: snapclient_media_player
    hostname: ${snapserver_hostname}
    # port: 1704  # default
    name: ${friendly_name}
    i2s_dout_pin: ${i2s_dout_pin}
    on_play:
      - logger.log: "Playback started!"
    on_pause:
      - logger.log: "Playback paused!"
    on_idle:
      - logger.log: "Playback finished!"
    on_state:
      - logger.log: "Playback State change!"
