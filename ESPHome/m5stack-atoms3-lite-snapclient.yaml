# I have no need of IR transmitter, so just turn this off completely
# # ============================================================================
# # IR Remote Transmitter - Infrared LED for Remote Control
# # ============================================================================
# # The ATOM S3 Lite has a built-in IR LED on GPIO4 for controlling TVs, etc.
# # Documentation: https://esphome.io/components/remote_transmitter/
# remote_transmitter:
#   # The IR LED is connected to GPIO4
#   pin: GPIO4

#   # Carrier duty cycle controls IR signal strength (50% is standard)
#   carrier_duty_percent: 50%

#   # Internal ID to reference the IR transmitter in automations
#   id: ir_transmitter

#   # Non-blocking allows other code to run while IR signal is being sent
#   non_blocking: true

# Useful for Home Assistant, nothing else.
# I can't find any way to make the button directly trigger a snapclient mute or similar, sadly.
# ============================================================================
# Binary Sensors - On/Off Sensors
# ============================================================================
binary_sensor:
  # Status Sensor - Shows if device is online or offline in Home Assistant
  - platform: status
    # The name that appears in Home Assistant
    name: "${friendly_name} Status"

  # Physical Button - The built-in button on GPIO41
  - platform: gpio
    # The name that appears in Home Assistant
    name: "${friendly_name} Button"

    # Button configuration
    pin:
      # The button is connected to GPIO41
      number: GPIO41

      # Inverted means pressed=LOW, released=HIGH (common for buttons with pullup)
      inverted: true

      # Pin mode configuration
      mode:
        # Configure as input (reads signal)
        input: true

        # Enable internal pullup resistor (keeps pin HIGH when button not pressed)
        pullup: true

    # Filters clean up the button signal
    filters:
      # Debouncing: Ignore button bouncing for 10 milliseconds
      - delayed_off: 10ms

    # WTF is this in the default upstream config?
    # I have no use in the IR transmitter, and certainly don't need it for this specific TV
    # # Action to perform when button is pressed
    # on_press:
    #   then:
    #     # Send Samsung TV power signal via IR LED
    #     - remote_transmitter.transmit_samsung:
    #         # Samsung TV power code (change this for other devices)
    #         data: 0xE0E040BF

    #     # Write a message to the logs for debugging
    #     - logger.log: "Samsung TV Power Signal sent"

# ref: https://docs.m5stack.com/en/homeassistant/media_player/atomic_audio_3.5_base
# ...#31-basic-configuration
i2c:
  - id: ext_bus
    sda: GPIO38
    scl: GPIO39
# ...#35-speaker-amplifier-configuration
# This is a "port extender" it just gives you more GPIO over I2C.
# It is only used for this 1 single "speaker enable" PIN,
# without it the builtin amp won't turn on.
# FIXME: Consider marking this internal and always on.
# FIXME: Can we switch this on/off from firmware when snapcast mutes/unmutes?
pi4ioe5v6408:
  - id: pi4ioe5v6408_hub
    i2c_id: ext_bus
    address: 0x43
switch:
  - platform: gpio
    name: "Speaker Enable"
    id: speaker_enable
    pin:
      pi4ioe5v6408: pi4ioe5v6408_hub
      number: 0
      mode:
        output: true
    icon: "mdi:volume-high"
    # FIXME: Use DEFAULT_ON instead to avoid any confusion if I forgot I turned it off before reboot?
    restore_mode: RESTORE_DEFAULT_ON

# ...#32-audio-configuration
i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: GPIO6
    i2s_bclk_pin: GPIO8
audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: ext_bus
    bits_per_sample: 16bit
    sample_rate: 48000
    use_microphone: false
    use_mclk: false

