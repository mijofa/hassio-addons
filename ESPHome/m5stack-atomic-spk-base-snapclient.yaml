external_components:
  # https://github.com/esphome/esphome/pull/14389
  - source: github://pr#14389
    components: [ snapclient, media_player ]
    refresh: 1d
  # - source: github://mijofa/esphome-luar123-snapclient@snapclient2
  #   components: [ snapclient, media_player ]
  #   refresh: 0s

# ============================================================================
# ESP32 Hardware Configuration
# ============================================================================
esp32:
  framework:
    type: esp-idf

# Main ref: https://community.home-assistant.io/t/solved-esphome-media-player-with-m5stack-spk-kit-and-atoms3-lite/784663
i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: ${i2s_lrclk_pin}
    i2s_bclk_pin: ${i2s_bclk_pin}
    i2s_mclk_pin: ${i2s_mclk_pin}

